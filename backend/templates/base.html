<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "Physics Data Platform" }}</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
      header { padding: 12px 16px; background: #0b1220; color: #fff; }
      header a { color: #fff; text-decoration: none; }
      main { padding: 16px; max-width: 1100px; margin: 0 auto; }
      .card { border: 1px solid #e6e8ef; border-radius: 10px; padding: 12px 14px; margin: 10px 0; }
      .muted { color: #6a7280; }
      code, pre { background: #0b1220; color: #e6f3ff; }
      pre { padding: 12px; border-radius: 10px; overflow: auto; }
      a { color: #0a5bd3; }
    </style>
  </head>
  <body>
    <header>
      <a href="/ui"><strong>Physics Data Platform</strong></a>
      <span class="muted" style="margin-left: 8px;">single-PC backend</span>
      <span style="float:right"><a href="/docs">API docs</a></span>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
